services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: pr_agent

  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    depends_on:
      - mongo
    environment:
      PORT: 3001
      MONGODB_URI: mongodb://mongo:27017/pr_agent
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      GEMINI_REVIEW_MODEL: ${GEMINI_REVIEW_MODEL:-gemini-1.5-pro}
      GEMINI_SYNTHESIS_MODEL: ${GEMINI_SYNTHESIS_MODEL:-gemini-1.5-flash}

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  mongo_data:
